name: Verifiser server
on:
  pull_request:
    paths:
      - 'server/**'
      - 'packages/server-utils/**'
      - '.github/workflows/verify-server.yml'

jobs:
  test:
    name: Server tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # ratchet:pnpm/action-setup@v4.1.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          PACKAGES_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}

      - name: Run tests
        working-directory: server
        run: pnpm test
