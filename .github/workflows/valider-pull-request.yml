name: Valider pull request
on: [pull_request]
jobs:
  valider:
    name: Valider pull request
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # ratchet:pnpm/action-setup@v4.1.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6.4.0
        with:
          node-version: 26.1.0
          cache: 'pnpm'

      - name: Use turbo cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # ratchet:actions/cache@v5.0.5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.ref_name }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: turbo-${{ runner.os }}-master-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Installere dependencies
        run: pnpm install --frozen-lockfile
        env:
          PACKAGES_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}

      - name: ESLint
        run: pnpm run eslint

      - name: Typesjekk (tsc)
        run: pnpm run tsc

      - name: Server tests
        working-directory: server
        run: pnpm test

  browser-tests:
    name: Browser tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # ratchet:pnpm/action-setup@v4.1.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6.4.0
        with:
          node-version: 26.1.0
          cache: 'pnpm'

      - name: Use turbo cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # ratchet:actions/cache@v5.0.5
        with:
          path: .turbo
          key: turbo-browser-${{ runner.os }}-${{ github.ref_name }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: turbo-browser-${{ runner.os }}-master-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Installere dependencies
        run: pnpm install --frozen-lockfile
        env:
          PACKAGES_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}

      - name: Installer Playwright (chromium)
        run: pnpm dlx playwright install --with-deps chromium

      - name: Kjør browser tests
        run: pnpm exec turbo run test:browser --filter=./apps/* --only

  knip-it:
    name: Kjør Knip
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Kjør Knip
        uses: navikt/fp-gha-workflows/.github/actions/knip-it@main
        with:
          npm-auth-token: ${{ secrets.READER_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          package-manager: 'pnpm'
          node-version: 26.1.0
