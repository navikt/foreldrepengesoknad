name: Valider pull request
on: [pull_request]
jobs:
  valider:
    name: Valider pull request
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # ratchet:actions/checkout@v7.0.1

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # ratchet:pnpm/action-setup@v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # ratchet:actions/setup-node@v7.0.0
        with:
          node-version: 26
          registry-url: 'https://npm.pkg.github.com'
          cache: 'pnpm'

      - name: Use turbo cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # ratchet:actions/cache@v6.1.0
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.ref_name }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: turbo-${{ runner.os }}-master-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Installere dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}

      - name: ESLint
        run: pnpm run eslint

      - name: Typesjekk (tsc)
        run: pnpm run tsc

      - name: Server tests
        working-directory: server
        run: pnpm test

  browser-tests:
    name: Browser tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Rådgivende, ikke-blokkerende: browser-testene er ennå ikke stabile i headless CI
    # (timeouts, filopplasting/submit som ikke fullfører). Jobben kjører og rapporterer
    # alle feil i loggen (--continue), men blokkerer ikke merge før de er stabilisert.
    continue-on-error: true
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # ratchet:actions/checkout@v7.0.1

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # ratchet:pnpm/action-setup@v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # ratchet:actions/setup-node@v7.0.0
        with:
          node-version: 26
          registry-url: 'https://npm.pkg.github.com'
          cache: 'pnpm'

      - name: Use turbo cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # ratchet:actions/cache@v6.1.0
        with:
          path: .turbo
          key: turbo-browser-${{ runner.os }}-${{ github.ref_name }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: turbo-browser-${{ runner.os }}-master-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Installere dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}

      - name: Installer Playwright (chromium)
        run: pnpm --filter @navikt/fp-config-vite exec playwright install --with-deps chromium
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}

      - name: Kjør browser tests
        # --concurrency=1: kjør én app av gangen. Headless chromium i CI (2 vCPU) blir
        # CPU-svelta når alle appane sine browser-suiter køyrer samtidig, noko som gjev
        # timeouts (også på screenshots) og userEvent-flytar som ikkje fullfører.
        run: pnpm exec turbo run test:browser --filter=./apps/* --only --continue --concurrency=1

  knip-it:
    name: Kjør Knip
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Kjør Knip
        uses: navikt/fp-gha-workflows/.github/actions/knip-it@main
        with:
          npm-auth-token: ${{ secrets.READER_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          package-manager: 'pnpm'
          node-version: 26
