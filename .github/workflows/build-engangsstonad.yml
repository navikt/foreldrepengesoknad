name: Bygg og deploy Engangsstønad
on:
  workflow_dispatch:
  push:
    paths:
      - 'apps/engangsstonad/**'
      - 'packages/**'
      - 'server/**'
      - '.deploy/engangsstonad/**'
      - '.deploy/naiserator.yaml'
      - '.github/workflows/build-engangsstonad.yml'
      - '.github/workflows/build.yml'
      - 'turbo.json'
      - 'Dockerfile'
      - 'pnpm-lock.yaml'

jobs:
  build-app:
    name: Build
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/build.yml
    with:
      runs-on: 'ubuntu-latest-4-cores' # default: ubuntu-latest
      build-image: ${{ github.ref_name == 'master' }} # default: true
      push-image: ${{ github.ref_name == 'master' }} # default: false
      app: engangsstonad
      image_suffix: '/engangsstonad'
    secrets:
      READER_TOKEN: ${{ secrets.READER_TOKEN }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

  upload-to-CDN:
    name: Upload assets to CDN
    if: github.ref_name == 'master'
    needs: build-app
    permissions:
      contents: read
      id-token: write
    uses: navikt/fp-gha-workflows/.github/workflows/cdn-upload.yml@main
    with:
      image: ${{ needs.build-app.outputs.build-version }}
      image_suffix: '/engangsstonad'
      destination: '/engangsstonad/soknad'

  deploy-dev:
    name: Deploy dev
    permissions:
      id-token: write
    if: github.ref_name == 'master'
    needs: build-app
    uses: navikt/fp-gha-workflows/.github/workflows/deploy.yml@main
    with:
      gar: true
      image: ${{ needs.build-app.outputs.build-version }}
      cluster: dev-gcp
      image_suffix: '/engangsstonad'
      deploy_context: '/engangsstonad'

  deploy-prod:
    name: Deploy prod
    permissions:
      id-token: write
    if: github.ref_name == 'master'
    needs: [build-app, deploy-dev]
    uses: navikt/fp-gha-workflows/.github/workflows/deploy.yml@main
    with:
      gar: true
      image: ${{ needs.build-app.outputs.build-version }}
      cluster: prod-gcp
      image_suffix: '/engangsstonad'
      deploy_context: '/engangsstonad'
