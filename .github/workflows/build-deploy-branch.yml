name: Bygg og deploy manuelt
on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch name'
        type: string
        required: true
      app:
        required: true
        type: choice
        description: 'Applikasjon som skal deployes fra branch'
        options:
          - engangsstonad
          - foreldrepengeoversikt
          - foreldrepengesoknad
          - svangerskapspengesoknad
          - planlegger
          - veiviser-fp-eller-es
          - veiviser-hvor-mye

jobs:
  build-app:
    name: Build
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/build.yml
    with:
      runs-on: 'ubuntu-latest-4-cores' # default: ubuntu-latest
      push-image: true
      branch: ${{ inputs.branch }}
      app: ${{ inputs.app }}
      image_suffix: '/${{ inputs.app }}'
      # Kun planlegger bakar CDN-URL inn i assets (jf. build-planlegger.yml).
      vite-cdn-url: ${{ inputs.app == 'planlegger' && 'https://cdn.nav.no/teamforeldrepenger/foreldrepenger/planlegger/' || '' }}
    secrets:
      READER_TOKEN: ${{ secrets.READER_TOKEN }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

  upload-to-CDN:
    name: Upload assets to CDN
    needs: build-app
    permissions:
      contents: read
      id-token: write
    uses: navikt/fp-gha-workflows/.github/workflows/cdn-upload.yml@main
    with:
      image: ${{ needs.build-app.outputs.build-version }}
      image_suffix: '/${{ inputs.app }}'
      # Destinasjon = appens vite base (samme verdi som i build-<app>.yml)
      destination: >-
        ${{ inputs.app == 'engangsstonad' && '/engangsstonad/soknad'
        || inputs.app == 'foreldrepengeoversikt' && '/foreldrepenger/oversikt'
        || inputs.app == 'foreldrepengesoknad' && '/foreldrepenger/soknad'
        || inputs.app == 'svangerskapspengesoknad' && '/svangerskapspenger/soknad'
        || inputs.app == 'planlegger' && '/foreldrepenger/planlegger'
        || inputs.app == 'veiviser-fp-eller-es' && '/foreldrepenger/foreldrepenger-eller-engangsstonad'
        || inputs.app == 'veiviser-hvor-mye' && '/foreldrepenger/hvor-mye' }}

  deploy-dev:
    name: Deploy dev
    permissions:
      id-token: write
    needs: [build-app, upload-to-CDN]
    uses: navikt/fp-gha-workflows/.github/workflows/deploy.yml@main
    with:
      gar: true
      branch: ${{ inputs.branch }}
      image: ${{ needs.build-app.outputs.build-version }}
      cluster: dev-gcp
      image_suffix: '/${{ inputs.app }}'
      deploy_context: '/${{ inputs.app }}'
