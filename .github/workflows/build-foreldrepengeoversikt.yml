name: Bygg og deploy Foreldrepengeoversikt
on:
  workflow_dispatch:
  push:
    paths:
      - 'apps/foreldrepengeoversikt/**'
      - 'packages/**'
      - 'server/**'
      - '.deploy/foreldrepengeoversikt/**'
      - '.deploy/naiserator.yaml'
      - '.github/workflows/build-foreldrepengeoversikt.yml'
      - '.github/workflows/build.yml'
      - 'turbo.json'
      - 'Dockerfile'
      - 'pnpm-lock.yaml'

jobs:
  build-app:
    name: Build
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/build.yml
    with:
      runs-on: 'ubuntu-latest-4-cores' # default: ubuntu-latest
      push-image: ${{ github.ref_name == 'master' }} # default: false
      app: foreldrepengeoversikt
      image_suffix: '/foreldrepengeoversikt'
      # Bakes inn i asset-referansene (renderBuiltUrl) slik at foreldrepengeoversikt laster assets fra CDN.
      # Må matche upload-to-CDN destination (teamforeldrepenger + /foreldrepenger/oversikt).
      vite-cdn-url: 'https://cdn.nav.no/teamforeldrepenger/foreldrepenger/oversikt/'
    secrets:
      READER_TOKEN: ${{ secrets.READER_TOKEN }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

  upload-to-CDN:
    name: Upload assets to CDN
    if: github.ref_name == 'master'
    needs: build-app
    permissions:
      contents: read
      id-token: write
    uses: navikt/fp-gha-workflows/.github/workflows/cdn-upload.yml@main
    with:
      image: ${{ needs.build-app.outputs.build-version }}
      image_suffix: '/foreldrepengeoversikt'
      destination: '/foreldrepenger/oversikt'

  deploy-dev:
    name: Deploy dev
    permissions:
      id-token: write
    if: github.ref_name == 'master'
    needs: [build-app, upload-to-CDN]
    uses: navikt/fp-gha-workflows/.github/workflows/deploy.yml@main
    with:
      gar: true
      image: ${{ needs.build-app.outputs.build-version }}
      cluster: dev-gcp
      image_suffix: '/foreldrepengeoversikt'
      deploy_context: '/foreldrepengeoversikt'

  deploy-prod:
    name: Deploy prod
    permissions:
      id-token: write
    if: github.ref_name == 'master'
    needs: [build-app, deploy-dev]
    uses: navikt/fp-gha-workflows/.github/workflows/deploy.yml@main
    with:
      gar: true
      image: ${{ needs.build-app.outputs.build-version }}
      cluster: prod-gcp
      image_suffix: '/foreldrepengeoversikt'
      deploy_context: '/foreldrepengeoversikt'
