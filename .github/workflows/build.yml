name: Build app
on:
  workflow_call:
    secrets:
      READER_TOKEN:
        description: 'A token passed from the caller workflow'
        required: true
      SENTRY_AUTH_TOKEN:
        description: 'A token passed from the caller workflow'
        required: true
    inputs:
      runs-on:
        required: false
        type: string
        description: Miljø versjon som skal brukes til bygg.
        default: 'ubuntu-latest'
      build-image:
        required: false
        type: boolean
        description: Skal docker image bygges?
        default: false
      push-image:
        required: false
        type: boolean
        description: Skal docker image pushes?
        default: false
      branch:
        required: false
        type: string
        description: Alternativ branch å bygge fra
      image_suffix:
        required: false
        type: string
        description: 'The suffix of the image to be deployed'
        default: ''
      app:
        required: true
        type: string
        description: App som skal bygges
      vite-cdn-url:
        required: false
        type: string
        description: 'CDN-URL som bakes inn i appens asset-referanser ved bygg (kun planlegger i dag)'
        default: ''
    outputs:
      build-version:
        description: 'Build version'
        value: ${{ jobs.build-and-test.outputs.build-version }}
jobs:
  build-and-test:
    name: Build and test
    permissions:
      contents: read
      packages: write
      id-token: write
    runs-on: ${{ (github.event.pull_request.user.login == 'dependabot[bot]' && 'ubuntu-latest') || inputs.runs-on }}
    env:
      TZ: 'Europe/Oslo'
      APP: ${{ inputs.app }}
    outputs:
      build-version: ${{ steps.generate-build-version.outputs.build-version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
        with:
          ref: ${{ (inputs.branch != '' && inputs.branch) || '' }}

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # ratchet:pnpm/action-setup@v4.1.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6.4.0
        with:
          node-version: 26
          registry-url: 'https://npm.pkg.github.com'
          cache: 'pnpm'

      - name: Use turbo cache
        id: hent-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # ratchet:actions/cache/restore@v5.0.5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.ref_name }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ inputs.app }}
          restore-keys: |
            turbo-${{ runner.os }}-master-${{ hashFiles('pnpm-lock.yaml') }}-${{ inputs.app }}

      - name: Bestem server
        id: server
        run: |
          case "$APP" in
            planlegger|veiviser-fp-eller-es|veiviser-hvor-mye)
              echo "server=server-uinnlogget" >> "$GITHUB_OUTPUT" ;;
            *)
              echo "server=server" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Installere dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}

      - name: Opprett SENTRY_RELEASE environment variable
        if: inputs.push-image
        id: sentry_release_key
        run: |
          echo "SENTRY_RELEASE=$APP-$(git rev-parse --short HEAD)-$(date +%Y.%m.%d.%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Bygg og test app
        run: pnpm exec turbo run build test --filter="$APP"
        env:
          VITE_SENTRY_RELEASE: ${{ steps.sentry_release_key.outputs.SENTRY_RELEASE }}
          SENTRY_AUTH_TOKEN: ${{ inputs.push-image && secrets.SENTRY_AUTH_TOKEN || '' }}
          VITE_CDN_URL: ${{ inputs.vite-cdn-url }}

      - name: Bygg server
        run: pnpm --filter @navikt/${{ steps.server.outputs.server }} run build

      - name: Generate build version
        id: generate-build-version
        run: |
          echo "build-version=$(date +%Y.%m.%d.%H%M%S)-$(echo $GITHUB_SHA | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Print build version
        run: echo "Generated build-version is ${{ steps.generate-build-version.outputs.build-version }}"

      - name: Bygg og push docker image
        if: inputs.build-image || inputs.push-image
        uses: navikt/fp-gha-workflows/.github/actions/build-push-docker-image@main
        with:
          build-version: ${{ steps.generate-build-version.outputs.build-version }}
          push-image: ${{ inputs.push-image }}
          image_suffix: ${{ inputs.image_suffix }}
          build_args: |
            APP=${{ inputs.app }}
            SERVER=${{ steps.server.outputs.server }}

      - name: Lagre alltid turbo cache
        if: always() && steps.hent-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # ratchet:actions/cache/save@v5.0.5
        with:
          key: ${{ steps.hent-cache.outputs.cache-primary-key }}
          path: .turbo
