packages:
  - apps/*
  - packages/*
  - server
  - server-uinnlogget

catalog:
  # Rammeverk / kjerne
  react: 19.2.7
  react-dom: 19.2.7
  react-router-dom: 7.17.0
  react-hook-form: 7.78.0
  react-intl: 10.1.13
  '@tanstack/react-query': 5.101.0
  '@tanstack/react-query-devtools': 5.101.0
  dayjs: 1.11.21
  ky: 2.0.2
  lodash: 4.18.1
  classnames: 2.5.1
  i18n-iso-countries: 7.14.0

  # Nav / Aksel design system
  '@navikt/ds-react': 8.12.1
  '@navikt/ds-css': 8.12.1
  '@navikt/ds-tailwind': 8.12.1
  '@navikt/aksel-icons': 8.12.1
  '@navikt/nav-dekoratoren-moduler': 4.2.2

  # Build / verktøy
  typescript: 6.0.3
  vite: 8.0.16
  tailwindcss: 4.3.1
  esbuild: 0.28.1
  eslint: 10.5.0
  ts-node: ^10.9.2
  '@sentry/vite-plugin': 5.3.0

  # Test / Storybook
  vitest: 4.1.8
  jsdom: 29.1.1
  '@testing-library/react': 16.3.2
  '@testing-library/jest-dom': 6.9.1
  '@testing-library/user-event': 14.6.1
  '@testing-library/dom': 10.4.1
  mockdate: 3.0.5
  storybook: 10.4.4
  '@storybook/react-vite': 10.4.4
  '@storybook/addon-links': 10.4.4
  storybook-react-intl: 10.2.1

  # Server
  express: 5.2.1
  http-proxy-middleware: 4.1.0
  mustache-express: 1.3.2
  morgan: 1.11.0
  dotenv: 17.4.2

  # Typer (@types)
  '@types/node': 25.9.3
  '@types/react': 19.2.17
  '@types/react-dom': 19.2.3
  '@types/express': 5.0.6
  '@types/lodash': 4.17.24
  '@types/morgan': 1.9.10

overrides:
  js-cookie: 3.0.7

ignoredBuiltDependencies:
  - '@parcel/watcher'
  - esbuild

minimumReleaseAge: 2880

minimumReleaseAgeExclude:
  - '@navikt/*'
  - vite@8.0.5

onlyBuiltDependencies:
  - msw
